<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sick Launch Light</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <section class="game-card">
      <header class="topbar">
        <div>
          <p class="eyebrow">Reaction Time Game</p>
          <h1>Sick Launch Light</h1>
        </div>
        <button id="resetBtn" class="ghost-btn" type="button">Reset</button>
      </header>

      <section class="scene-wrap" aria-label="Drag strip scene">
        <div class="scene" id="scene">
          <div class="sky"></div>
          <div class="grandstand left"></div>
          <div class="grandstand right"></div>
          <div class="trackside-barrier left"></div>
          <div class="trackside-barrier right"></div>
          <div class="scoreboard left"></div>
          <div class="scoreboard right"></div>
          <div class="horizon-glow"></div>

          <div class="tree-zone">
            <div class="christmas-tree" id="tree" aria-label="Drag racing Christmas tree">
              <div class="tree-cap"></div>
              <div class="tree-post"></div>
              <div class="lamp pre"></div>
              <div class="lamp stage"></div>
              <div class="lamp red red-1"></div>
              <div class="lamp red red-2"></div>
              <div class="lamp red red-3"></div>
              <div class="lamp amber amber-1"></div>
              <div class="lamp amber amber-2"></div>
              <div class="lamp green"></div>
            </div>
          </div>

          <div class="sponsor-board">
            <img src="assets/sick-logo.jpeg" alt="Sick The Magazine sponsor logo" />
            <span>Track Sponsor</span>
          </div>

          <div class="lane-markers"></div>
          <div class="lane-markers lane-markers-right"></div>
          <div class="rubber-line left"></div>
          <div class="rubber-line right"></div>
          <div class="center-strip"></div>

          <div class="cockpit" id="cockpit">
            <div class="windshield-frame top"></div>
            <div class="windshield-frame left"></div>
            <div class="windshield-frame right"></div>
            <div class="dashboard" id="dashboard">
              <div class="gauge-cluster">
                <div class="gauge speed">
                  <span class="gauge-label">RPM</span>
                  <div class="gauge-face"><div class="needle" id="rpmNeedle"></div></div>
                </div>
                <div class="gauge center-screen">
                  <span class="status-label">Status</span>
                  <div class="status-screen" id="statusText">Tap Start, then hit GO on green.</div>
                </div>
                <div class="gauge reaction">
                  <span class="gauge-label">RT</span>
                  <div class="reaction-display" id="reactionDisplay">0.000 s</div>
                </div>
              </div>
              <div class="steering-wheel" aria-hidden="true"></div>
            </div>
            <div class="hood-edge"></div>
          </div>
        </div>
      </section>

      <section class="controls-panel">
        <div class="primary-actions">
          <button id="startBtn" class="main-btn" type="button">Start Run</button>
          <button id="launchBtn" class="launch-btn" type="button">TAP ON GREEN</button>
        </div>

        <div class="view-panel" aria-label="View selector">
          <span class="panel-label">Views</span>
          <div class="view-buttons">
            <button class="view-btn active" data-view="windshield" type="button">Windshield</button>
            <button class="view-btn" data-view="dash" type="button">Dash</button>
            <button class="view-btn" data-view="hood" type="button">Hood</button>
          </div>
        </div>

        <div class="stats-grid">
          <article class="stat-box">
            <span class="stat-label">Last</span>
            <strong id="lastStat">—</strong>
          </article>
          <article class="stat-box">
            <span class="stat-label">Best</span>
            <strong id="bestStat">—</strong>
          </article>
          <article class="stat-box">
            <span class="stat-label">Average</span>
            <strong id="avgStat">—</strong>
          </article>
          <article class="stat-box">
            <span class="stat-label">Runs</span>
            <strong id="runsStat">0</strong>
          </article>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
